$kind: http-request
name: Get Product
method: GET
url: '{{baseUrl}}/api/admin/products/{{productId}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has product", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("product");
          pm.expect(json.product).to.have.property("id");
          pm.expect(json.product).to.have.property("name");
          pm.expect(json.product).to.have.property("price");
          pm.expect(json.product).to.have.property("status");
      });
