$kind: http-request
name: Update Product
method: PATCH
url: "{{baseUrl}}/api/admin/products/{{productId}}"
order: 4000
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Product Name1",
      "price": 34.99,
      "stock": 80,
      "status": "active",
      "visibility": "public"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has updated product", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("product");
          pm.expect(json.product).to.have.property("id");
          pm.expect(json.product).to.have.property("name");
          pm.expect(json.product).to.have.property("updatedAt");
      });
    language: text/javascript
