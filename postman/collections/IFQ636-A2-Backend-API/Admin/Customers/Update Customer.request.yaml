$kind: http-request
name: Update Customer
method: PATCH
url: "{{baseUrl}}/api/admin/customers/{{customerId}}"
order: 3000
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Doe"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has updated customer", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("customer");
          pm.expect(json.customer).to.have.property("id");
          pm.expect(json.customer).to.have.property("email");
      });
    language: text/javascript
