$kind: http-request
name: Update Order Status
method: PATCH
url: '{{baseUrl}}/api/admin/orders/{{orderId}}/status'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{adminToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "packed"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has order with updated status", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("order");
          pm.expect(json.order).to.have.property("id");
          pm.expect(json.order).to.have.property("status");
      });
