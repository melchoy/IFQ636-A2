$kind: http-request
name: Get Order Detail
method: GET
url: '{{baseUrl}}/api/storefront/orders/{{orderId}}'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{customerToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has order with expected properties", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("order");
          pm.expect(json.order).to.have.property("id");
          pm.expect(json.order).to.have.property("status");
      });
