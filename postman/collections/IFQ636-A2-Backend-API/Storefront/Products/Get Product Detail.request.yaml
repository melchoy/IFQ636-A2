$kind: http-request
name: Get Product Detail
method: GET
url: '{{baseUrl}}/api/storefront/products/{{productId}}'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response has product with expected properties", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("product");
          pm.expect(json.product).to.have.property("id");
          pm.expect(json.product).to.have.property("name");
          pm.expect(json.product).to.have.property("price");
          pm.expect(json.product).to.have.property("sku");
      });
