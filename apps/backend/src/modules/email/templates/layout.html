<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <title>{{title}}</title>
    <style>
      @media screen and (max-width: 720px) {
        .email-page-padding {
          padding: 24px 12px !important;
        }

        .email-shell {
          width: 100% !important;
          max-width: 100% !important;
        }

        .email-shell-section {
          padding-left: 24px !important;
          padding-right: 24px !important;
        }
      }

      @media screen and (max-width: 520px) {
        .email-brand-cell,
        .email-badge-cell {
          display: block !important;
          width: 100% !important;
          text-align: left !important;
        }

        .email-badge-cell {
          padding-top: 16px !important;
        }

        .email-type-badge {
          display: block !important;
          width: 100% !important;
          box-sizing: border-box !important;
        }
      }
    </style>
  </head>
  <body bgcolor="#0b080d" style="margin:0;background-color:#0b080d;font-family:Arial,Helvetica,sans-serif;color:#f2ede3;">
    <span style="display:none!important;visibility:hidden;opacity:0;color:transparent;height:0;width:0;overflow:hidden;">
      {{preheader}}
    </span>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" bgcolor="#0b080d" style="background-color:#0b080d;">
      <tr>
        <td class="email-page-padding" align="center" bgcolor="#0b080d" style="background-color:#0b080d;padding:40px 16px;">
          <table class="email-shell" role="presentation" width="100%" cellspacing="0" cellpadding="0" bgcolor="#121116" style="width:100%;max-width:680px;border-collapse:separate;border-spacing:0;background-color:#121116;border:1px solid #2b2630;border-radius:10px;overflow:hidden;">
            <tr>
              <td class="email-shell-section" bgcolor="#121116" style="background-color:#121116;background-image:linear-gradient(90deg, rgba(36,8,14,0.65) 0%, rgba(18,17,22,0.65) 100%);padding:28px 40px 22px;border-radius:10px 10px 0 0;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td class="email-brand-cell" align="left" valign="middle" style="width:70%;">
                      <p style="margin:0 0 2px;font-size:12px;line-height:17px;font-weight:700;text-transform:uppercase;color:#f2ede3;">
                        ORDER OF THE BLACK THORN
                      </p>
                      <p style="margin:0;font-size:10px;line-height:14px;color:#a79f94;">
                        Dark florals, vessels, and keepsakes.
                      </p>
                    </td>
                    <td class="email-badge-cell" align="right" valign="middle" style="width:30%;">
                      <span class="email-type-badge" style="display:inline-block;min-width:84px;padding:5px 10px;border:1px solid #6d5b29;border-radius:999px;background-color:#2c2618;color:#d6b24c;font-size:10px;line-height:12px;font-weight:700;text-align:center;">
                        {{emailType}}
                      </span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td class="email-shell-section" bgcolor="#121116" style="background-color:#121116;padding:34px 40px;">
                {{content}}
              </td>
            </tr>
            <tr>
              <td class="email-shell-section" bgcolor="#0e0d11" style="background-color:#0e0d11;padding:26px 40px 28px;border-radius:0 0 10px 10px;">
                <p style="margin:0 0 8px;font-size:12px;line-height:17px;font-weight:700;color:#f2ede3;">
                  Order of the Black Thorn
                </p>
                <p style="margin:0 0 8px;font-size:11px;line-height:16px;color:#a79f94;">
                  You are receiving this message because you placed an order or created a customer account with Order of the Black Thorn.
                </p>
                <p style="margin:0;font-size:11px;line-height:16px;color:#716a62;">
                  Sydney, NSW 2000
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
